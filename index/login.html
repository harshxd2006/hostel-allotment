<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hostel Allotment Portal 2026 - Login</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <img src="nith_logo.png" alt="NIT Hamirpur Logo" class="header-logo" />
    <div class="header-text">
      <div class="hindi">राष्ट्रीय प्रौद्योगिकी संस्थान हमीरपुर</div>
      <div class="english">National Institute of Technology Hamirpur</div>
      <div class="sub">(An Institute of National Importance)</div>
    </div>
  </div>

  <!-- Blue bar -->
  <div class="blue-bar">
    <h2>Hostel Allotment Portal 2026</h2>
  </div>

  <!-- Page body -->
  <div class="page">
    <div class="card">
      <h3>Student Login</h3>
      <p class="subtitle">Himadri Boys Hostel · 3rd Year Allotment</p>

      <div class="field">
        <label for="roll">Roll Number</label>
        <input type="text" id="roll" placeholder="e.g. 22BCS045" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <button class="btn">Login</button>

      <p class="forgot"><a href="#">Forgot password?</a></p>
      <p class="footer-note">For access issues, contact hostel admin</p>
    </div>
  </div>

</body>
</html>
